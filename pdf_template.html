<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
  $math$
  <style>
    body {
      font-family: "Georgia", serif;
      font-size: 11pt;
      line-height: 1.6;
      color: #1a1a1a;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 3.5rem;
    }
    h1 { font-size: 1.7rem; margin-bottom: 0.25rem; color: #1a3a5c; }
    h2 { font-size: 1.25rem; border-bottom: 1px solid #ccc; padding-bottom: 0.3rem; margin-top: 2rem; color: #1a3a5c; }
    h3 { font-size: 1.05rem; margin-top: 1.5rem; color: #1a3a5c; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: 10pt;
      page-break-inside: avoid;
    }
    th, td {
      border: 1px solid #bbb;
      padding: 0.4rem 0.7rem;
      text-align: left;
    }
    th {
      background: #d0e4f7;
      font-weight: bold;
    }
    tr:nth-child(even) { background: #f2f8ff; }
    code {
      background: #f0f0f0;
      padding: 0 4px;
      border-radius: 3px;
      font-size: 0.9em;
    }
    blockquote {
      border-left: 4px solid #aaa;
      margin: 1rem 0;
      padding: 0.5rem 1rem;
      color: #444;
      font-style: italic;
    }
    h1, h2, h3 { page-break-after: avoid; }
    p { text-align: justify; }
    img { max-width: 100%; height: auto; }
    @media print {
      body { font-size: 10.5pt; }
      .container { padding: 0; }
      h2 { page-break-before: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
$body$
  </div>
</body>
</html>
